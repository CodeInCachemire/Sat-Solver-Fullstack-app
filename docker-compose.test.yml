version: "3.8"

services:
  postgres-test:
    image: postgres:15-alpine
    container_name: sat-solver-postgres-test
    environment:
      POSTGRES_DB: sat_solver_test
      POSTGRES_USER: sat_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sat_user -d sat_solver_test"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
